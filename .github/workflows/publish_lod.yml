name: Publish LMMHA Linked Open Data
on:
  push:
    branches:
      - main
    paths:
      - 'references/lmmha/lmmha_base_2001.json'
      - 'references/lmmha/lmmha_timeline.json'
      - 'references/lmmha/lmmha_scope_notes_2001.json'
      - 'publicfinance/inject_search.py'
      - 'publicfinance/lmmha_history.py'
      - 'publicfinance/lmmha_notes.py'
      - 'publicfinance/lmmha_skos_exporter.py'
      - 'publicfinance/generate_lmmha_redirects.py'
      # human browser (served at the site root)
      - 'references/lmmha/lod/index.html'
      - 'references/lmmha/lod/app.js'
      - 'references/lmmha/lod/style.css'
      - 'references/lmmha/lod/observed.json'
      # money-flow Sankey page
      - 'references/lmmha/lod/flow.html'
      - 'references/lmmha/lod/flow.js'
      - 'references/lmmha/lod/sankey_assam.json'
      - 'references/lmmha/lod/sankey_assam_balance.json'
      - 'viz/build_browser_data.py'
      - '.github/workflows/publish_lod.yml'
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install rdflib==7.6.0 pylode==3.5.1

      - name: Generate Semantic Web Files (TTL & JSON-LD)
        run: |
          python publicfinance/lmmha_skos_exporter.py

      - name: Generate formal SKOS vocabulary page (PyLODE -> vocab.html)
        run: |
          pylode references/lmmha/lod/lmmha.ttl -o references/lmmha/lod/vocab.html -p vocpub
          python publicfinance/inject_search.py references/lmmha/lod/vocab.html
          python publicfinance/generate_lmmha_redirects.py

      - name: Build human browser payload (from tracked source JSON; stdlib only)
        run: |
          python viz/build_browser_data.py
          # index.html / app.js / style.css / observed.json are committed and served as-is.
          # observed.json is built locally from gitignored data/ and is NOT regenerated here.

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload entire lod directory
          path: 'references/lmmha/lod'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
